name: MeritQuant Scanner & AI Trader

on:
  schedule:
    - cron: '0 14 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '30 13 * * 1-5'
    - cron: '25 19 * * 1-5'

  workflow_dispatch:
    inputs:
      force_trade:
        description: 'Force AI trader to run'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      force_scan_only:
        description: 'Run scanner only'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  scan:
    name: Scan & Trade
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MeritQuant Scanner
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY:     ${{ secrets.FRED_API_KEY }}
        run: python main.py

      - name: Run AI Trader (open + pre-close only)
        if: ${{ github.event.inputs.force_scan_only != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY:      ${{ secrets.FRED_API_KEY }}
          TRADE_MODE: >-
            ${{
              (
                github.event.schedule == '30 13 * * 1-5' ||
                github.event.schedule == '25 19 * * 1-5' ||
                github.event.inputs.force_trade == 'true'
              ) && 'true' || 'false'
            }}
        run: python trading/trader.py

      - name: Commit results
        run: |
          git config --global user.email "bot@meritquant.ai"
          git config --global user.name "MeritQuant Bot"
          git add data/ reports/ -A
          git diff --staged --quiet || \
            git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
