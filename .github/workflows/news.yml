name: MeritQuant News Fetcher

on:
  schedule:
    - cron: '*/5 13-21 * * 1-5'
  workflow_dispatch:

jobs:
  news:
    name: Fetch News
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Fetcher
        run: PYTHONPATH=$GITHUB_WORKSPACE python news_fetcher.py

      - name: Commit news feed
        run: |
          git config --global user.email "bot@meritquant.ai"
          git config --global user.name "MeritQuant Bot"
          git add data/news_feed.json
          git diff --staged --quiet || \
            git commit -m "news: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
